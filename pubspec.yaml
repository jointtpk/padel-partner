name: padel_partner
description: Host and join padel games near you.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management + routing
  get: ^4.6.6

  # Firebase (disabled until google-services.json is added)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3

  # Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1

  # In-app purchases
  in_app_purchase: ^3.2.0

  # Typography
  google_fonts: ^6.2.1

  # SVG icons
  flutter_svg: ^2.0.10+1

  # Animations
  flutter_animate: ^4.5.0

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # OTP input
  pinput: ^5.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
