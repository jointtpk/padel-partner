name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-infos || true

      - name: Build debug APK (split per ABI)
        run: flutter build apk --debug --split-per-abi

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: padel-partner-debug
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          retention-days: 7

      - name: Build release APK (split per ABI, R8 enabled)
        run: flutter build apk --release --split-per-abi

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: padel-partner-release
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 7
