<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Padel Partner — Join Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0F1B5C 0%, #08113D 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    h1 { color: #D7FF36; font-size: 36px; margin: 0 0 14px; letter-spacing: -0.6px; }
    p  { color: rgba(255,255,255,0.78); font-size: 16px; line-height: 1.6; margin: 0; max-width: 420px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #D7FF36;
      border-radius: 50%;
      margin: 28px auto 12px;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btns { margin-top: 28px; display: none; }
    .btn {
      display: inline-block;
      padding: 14px 26px;
      margin: 6px;
      background: #D7FF36;
      color: #0F1B5C;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      border-radius: 999px;
    }
    .btn-outline {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .show { display: block !important; }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <h1>🎾 Padel Partner</h1>
  <p id="status">Opening the app…</p>
  <div class="spinner" id="spinner"></div>

  <div class="btns" id="btns">
    <a class="btn" id="openBtn" href="#">Open in app</a>
    <p style="margin-top: 28px; color: rgba(255,255,255,0.55); font-size: 14px;">Don't have the app yet?</p>
    <a class="btn btn-outline" href="#" id="playLink">Play Store</a>
    <a class="btn btn-outline" href="#" id="appstoreLink">App Store</a>
  </div>

<script>
(function () {
  // 1) Pull gameId from /g/<id>
  var match = window.location.pathname.match(/^\/g\/([^\/?#]+)/);
  if (!match) {
    document.getElementById("status").textContent = "Invalid game link.";
    document.getElementById("spinner").classList.add("hide");
    return;
  }
  var gameId   = decodeURIComponent(match[1]);
  var deepLink = "padelpartner://join?id=" + encodeURIComponent(gameId);

  document.getElementById("openBtn").setAttribute("href", deepLink);

  // 2) Try to bounce into the app.
  // We use a hidden iframe on Android (more permissive in some in-app
  // browsers like WhatsApp/Instagram) and window.location on iOS.
  var ua = navigator.userAgent || "";
  var isIOS = /iPad|iPhone|iPod/.test(ua);
  var triggered = false;

  function trigger() {
    if (triggered) return;
    triggered = true;
    if (isIOS) {
      window.location.href = deepLink;
    } else {
      var f = document.createElement("iframe");
      f.style.display = "none";
      f.src = deepLink;
      document.body.appendChild(f);
      // Some Android browsers also need a same-tab attempt.
      setTimeout(function () { window.location.href = deepLink; }, 250);
    }
  }

  // 3) If we don't lose focus / get backgrounded within 1.8s, show the
  // fallback so the user can tap "Open in app" or get the install link.
  var fallbackTimer = setTimeout(function () {
    document.getElementById("status").textContent =
      "Tap below if the app didn't open automatically.";
    document.getElementById("spinner").classList.add("hide");
    document.getElementById("btns").classList.add("show");
  }, 1800);

  // If the page is backgrounded (because the app opened), cancel the
  // fallback so the user doesn't see install prompts unnecessarily.
  function cancel() { clearTimeout(fallbackTimer); }
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) cancel();
  });
  window.addEventListener("pagehide", cancel);
  window.addEventListener("blur", cancel);

  // 4) Kick off the deep-link attempt after a tiny delay so the page
  // paints first.
  setTimeout(trigger, 80);
})();
</script>
</body>
</html>
